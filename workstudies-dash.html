<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CPO Management</title>
    <!--tailwind-->
    <link href="src/output.css" rel="stylesheet" />
    <!--fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cal+Sans&family=League+Gothic&family=Lexend:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!--icons-->
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/4.0.0/uicons-bold-rounded/css/uicons-bold-rounded.css"
    />
  </head>
  <body class="font-lexend text-neutral-800">
    <!--main container-->
    <div class="flex flex-col h-screen bg-neutral-50">
      <!--topnav-->
      <div class="bg-primary text-base-100 h-16 px-20 flex items-center">
        <div>
          <h1 class="font-black text-xl">CPO MANAGER</h1>
        </div>
        <div class="flex-1 flex justify-center">
          <ul class="menu menu-horizontal space-x-6">
            <li><a class="navItem" href="index.html">Home</a></li>
            <li>
              <a class="navItem" href="inventory-dash.html">Inventory</a>
            </li>
            <li>
              <a class="navItem navActive" href="workstudies-dash.html"
                >Workstudies</a
              >
            </li>
          </ul>
        </div>
        <div>
          <a class="btn bg-base-100 border-0 shadow-none w-30">Login</a>
        </div>
      </div>
      <!--submenu-->
      <div class="bg-base-100 h-16 flex items-center px-60 shadow-sm">
        <div role="tablist" class="tabs tabs-border h-full space-x-6">
          <a role="tab" class="tab tab-active" href="workstudies-dash.html"
            >Overview</a
          >
          <a role="tab" class="tab" href="workstudies-active.html">Active</a>
          <a role="tab" class="tab" href="workstudies-applicants.html"
            >Applicants</a
          >
        </div>
      </div>
      <!--main-->
      <div class="flex-1 py-10">
        <div class="grid md:grid-cols-3 px-60 gap-10">
          <!--upcoming interviews-->
          <div class="bg-base-100 rounded-lg shadow-sm p-8 flex flex-col">
            <div class="flex justify-between items-center">
              <h1 class="uppercase font-bold opacity-60 text-md">
                Upcoming Interviews
              </h1>
              <a href="" class="text-xs underline text-primary">Show All ></a>
            </div>
            <ul class="flex-grow mt-2">
              <li class="flex items-center border-b border-neutral-100 py-2">
                <div class="flex-1">
                  <h1 class="text-sm font-bold">Applicant Name</h1>
                </div>
                <div class="">
                  <h2 class="text-sm opacity-60">00/00/00</h2>
                </div>
              </li>
            </ul>
          </div>
          <!--To Schedule-->
          <div class="bg-base-100 rounded-lg shadow-sm p-8 flex flex-col">
            <div class="flex justify-between items-center">
              <h1 class="uppercase font-bold opacity-60 text-md">
                To Schedule
              </h1>
              <a href="" class="text-xs underline text-primary">Show All ></a>
            </div>
            <ul class="flex-grow mt-2">
              <li class="flex items-center border-b border-neutral-100 py-2">
                <div class="flex-1">
                  <h1 class="text-sm font-bold">Applicant Name</h1>
                </div>
                <div class="">
                  <h2 class="text-sm opacity-60">Type</h2>
                </div>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
