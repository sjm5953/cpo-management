<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CPO Management</title>
    <!--tailwind-->
    <link href="src/output.css" rel="stylesheet" />
    <!--fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cal+Sans&family=League+Gothic&family=Lexend:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!--icons-->
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/4.0.0/uicons-bold-rounded/css/uicons-bold-rounded.css"
    />
  </head>
  <body class="font-lexend text-neutral-800">
    <!--main container-->
    <div class="flex flex-col h-screen bg-neutral-50">
      <!--topnav-->
      <div class="bg-primary text-base-100 h-16 px-20 flex items-center">
        <div>
          <h1 class="font-black text-xl">CPO MANAGER</h1>
        </div>
        <div class="flex-1 flex justify-center">
          <ul class="menu menu-horizontal space-x-6">
            <li><a class="navItem" href="index.html">Home</a></li>
            <li>
              <a class="navItem" href="inventory-dash.html">Inventory</a>
            </li>
            <li>
              <a class="navItem navActive" href="workstudies-dash.html">
                Workstudies
              </a>
            </li>
          </ul>
        </div>
        <div>
          <a class="btn bg-base-100 border-0 shadow-none w-30">Login</a>
        </div>
      </div>

      <!--submenu-->
      <div class="bg-base-100 h-16 flex items-center px-60 shadow-sm">
        <div role="tablist" class="tabs tabs-border h-full space-x-6">
          <a role="tab" class="tab" href="workstudies-dash.html">Overview</a>
          <a role="tab" class="tab" href="workstudies-active.html"> Active </a>
          <a
            role="tab"
            class="tab tab-active"
            href="workstudies-applicants.html"
          >
            Applicants
          </a>
        </div>
      </div>

      <!--main-->
      <div class="flex-1 py-10 px-60 overflow-y-auto">
        <!--header-->
        <div class="flex items-center justify-between">
          <div class="flex gap-4 items-center">
            <h1 class="font-bold text-lg">Applicants</h1>
            <h2 id="activeCount" class="opacity-60">0</h2>
          </div>
          <div>
            <label class="input w-80 rounded-full">
              <i class="fi fi-br-search pt-1 opacity-60"></i>
              <input
                id="searchInput"
                type="search"
                class="grow"
                placeholder="Search"
              />
            </label>
          </div>
        </div>

        <!--body-->
        <div>
          <ul
            id="activeWorkstudyList"
            class="list bg-base-100 rounded-box shadow-md mt-4"
          >
            <li class="list-row">
              <div
                class="flex items-center justify-center py-6 w-full opacity-60"
              >
                Loading active workstudies...
              </div>
            </li>
          </ul>
        </div>
      </div>
    </div>
    <!-- drawer backdrop -->
    <div
      id="recordDrawerBackdrop"
      class="fixed inset-0 bg-black/30 opacity-0 pointer-events-none transition-opacity duration-200 z-40"
    ></div>

    <!-- drawer -->
    <aside
      id="recordDrawer"
      class="fixed top-0 right-0 h-full w-full max-w-xl bg-base-100 shadow-2xl translate-x-full transition-transform duration-300 z-50 flex flex-col"
    >
      <div
        class="flex items-center justify-between px-6 py-5 border-b border-neutral-200"
      >
        <div>
          <p class="text-xs uppercase tracking-wide opacity-50 font-bold">
            Applicant Record
          </p>
          <h2 id="drawerName" class="text-2xl font-black">Name</h2>
        </div>
        <button
          id="closeDrawerBtn"
          type="button"
          class="btn btn-ghost btn-circle"
          aria-label="Close details drawer"
        >
          ✕
        </button>
      </div>

      <div class="flex-1 overflow-y-auto p-6 space-y-6 flex flex-col">
        <div class="grid grid-cols-2 gap-4">
          <div class="bg-neutral-50 rounded-2xl p-4">
            <p class="text-xs uppercase opacity-50 font-bold">Status</p>
            <div id="drawerStatus" class="mt-2">—</div>
          </div>

          <div class="bg-neutral-50 rounded-2xl p-4">
            <p class="text-xs uppercase opacity-50 font-bold">App Date</p>
            <p id="drawerAppDate" class="mt-1 font-bold text-lg">—</p>
          </div>

          <div class="bg-neutral-50 rounded-2xl p-4">
            <p class="text-xs uppercase opacity-50 font-bold">
              First Interview
            </p>
            <p id="drawerFirstInterview" class="mt-1 font-bold text-lg">—</p>
          </div>

          <div class="bg-neutral-50 rounded-2xl p-4">
            <p class="text-xs uppercase opacity-50 font-bold">
              Second Interview
            </p>
            <p id="drawerSecondInterview" class="mt-1 font-bold text-lg">—</p>
          </div>
        </div>

        <div class="flex-1">
          <h3 class="font-black text-lg mb-3">Email Addresses</h3>

          <div class="space-y-3">
            <div
              class="flex items-center justify-between bg-neutral-50 rounded-2xl p-4 gap-4"
            >
              <div class="min-w-0">
                <p class="text-xs uppercase opacity-50 font-bold">
                  Student Email
                </p>
                <p id="drawerStudentEmail" class="mt-1 font-medium break-all">
                  —
                </p>
              </div>
              <button
                type="button"
                class="btn btn-square btn-ghost border border-neutral-200 shrink-0"
                aria-label="Student email action"
              >
                <i class="fi fi-br-envelope pt-1"></i>
              </button>
            </div>

            <div
              class="flex items-center justify-between bg-neutral-50 rounded-2xl p-4 gap-4"
            >
              <div class="min-w-0">
                <p class="text-xs uppercase opacity-50 font-bold">
                  Personal Email
                </p>
                <p id="drawerPersonalEmail" class="mt-1 font-medium break-all">
                  —
                </p>
              </div>
              <button
                type="button"
                class="btn btn-square btn-ghost border border-neutral-200 shrink-0"
                aria-label="Personal email action"
              >
                <i class="fi fi-br-envelope pt-1"></i>
              </button>
            </div>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <button
            id="viewApplicationBtn"
            type="button"
            class="btn bg-primary text-base-100 border-0 shadow-none w-full"
          >
            View Application
          </button>

          <button
            id="viewNotesBtn"
            type="button"
            class="btn bg-base-100 text-primary border-primary shadow-none w-full"
          >
            View Notes
          </button>
        </div>
      </div>
    </aside>

    <script>
      const AIRTABLE_TOKEN =
        "pat8zPyrNT7Awd9A7.e83bdd8ebdef7592930621d05ab3da4b7f85e21184183abbe8c4411c47d681a9";
      const BASE_ID = "appYqZMGk18beV4qI";
      const TABLE_NAME = "Applicants";

      const applicantList = document.getElementById("activeWorkstudyList");
      const applicantCount = document.getElementById("activeCount");
      const searchInput = document.getElementById("searchInput");

      const recordDrawer = document.getElementById("recordDrawer");
      const recordDrawerBackdrop = document.getElementById(
        "recordDrawerBackdrop",
      );
      const closeDrawerBtn = document.getElementById("closeDrawerBtn");

      const drawerName = document.getElementById("drawerName");
      const drawerStatus = document.getElementById("drawerStatus");
      const drawerAppDate = document.getElementById("drawerAppDate");
      const drawerFirstInterview = document.getElementById(
        "drawerFirstInterview",
      );
      const drawerSecondInterview = document.getElementById(
        "drawerSecondInterview",
      );

      const viewApplicationBtn = document.getElementById("viewApplicationBtn");
      const viewNotesBtn = document.getElementById("viewNotesBtn");

      const drawerStudentEmail = document.getElementById("drawerStudentEmail");
      const drawerPersonalEmail = document.getElementById(
        "drawerPersonalEmail",
      );

      let applicants = [];

      async function loadApplicants() {
        try {
          applicantList.innerHTML = `
        <li class="list-row">
          <div class="flex items-center justify-center py-6 w-full opacity-60">
            Loading applicants...
          </div>
        </li>
      `;

          const url = `https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(TABLE_NAME)}?sort[0][field]=Name&sort[0][direction]=asc`;

          const response = await fetch(url, {
            headers: {
              Authorization: `Bearer ${AIRTABLE_TOKEN}`,
            },
          });

          if (!response.ok) {
            const errorText = await response.text();
            throw new Error(
              `Airtable request failed: ${response.status} - ${errorText}`,
            );
          }

          const data = await response.json();

          applicants = data.records.map((record) => ({
            id: record.id,
            name: record.fields["Name"] || "Unnamed Applicant",
            status: record.fields["Status"] || "—",
            studentEmail: record.fields["Student Email"] || "—",
            personalEmail: record.fields["Personal Email"] || "—",
            appDate: record.fields["App Date"] || "—",
            firstInterview: record.fields["First Interview"] || "—",
            secondInterview: record.fields["Second Interview"] || "—",
            applicationUrl: record.fields["Application"]?.[0]?.url || "",
            notesUrl: record.fields["First Interview Notes"]?.[0]?.url || "",
          }));

          renderApplicants(applicants);
        } catch (error) {
          console.error("Error loading applicants:", error);
          applicantList.innerHTML = `
        <li class="list-row">
          <div class="flex items-center justify-center py-6 w-full text-red-600">
            Failed to load applicants.
          </div>
        </li>
      `;
          applicantCount.textContent = "0";
        }
      }

      function getStatusPill(status) {
        const normalized = (status || "").toLowerCase();

        let bgClass = "bg-neutral-200 text-neutral-800";

        if (normalized === "first interview - scheduled") {
          bgClass = "bg-sky-200 text-sky-800";
        } else if (normalized === "second interview - initiated") {
          bgClass = "bg-pink-200 text-pink-800";
        } else if (normalized === "potential applicant") {
          bgClass = "bg-neutral-200 text-neutral-800";
        } else if (normalized === "not moving forward") {
          bgClass = "bg-red-200 text-red-800";
        }

        return `
      <span class="px-3 py-1 rounded-full text-xs font-bold inline-block ${bgClass}">
        ${escapeHtml(status)}
      </span>
    `;
      }

      function renderApplicants(items) {
        applicantCount.textContent = items.length;

        if (!items.length) {
          applicantList.innerHTML = `
        <li class="list-row">
          <div class="flex items-center justify-center py-6 w-full opacity-60">
            No applicants found.
          </div>
        </li>
      `;
          return;
        }

        applicantList.innerHTML = items
          .map(
            (item) => `
          <li
            class="list-row grid grid-cols-[auto_1fr_0.8fr_1.4fr_auto] items-center gap-4 cursor-pointer hover:bg-neutral-50 transition-colors"
            onclick="openRecordDrawer('${item.id}')"
          >
            <div class="flex items-center">
              <input type="checkbox" class="checkbox checkbox-sm mr-4" onclick="event.stopPropagation()" />
            </div>

            <div class="flex items-center min-w-0">
              <h1 class="font-bold text-lg truncate">${escapeHtml(item.name)}</h1>
            </div>

            <div class="flex items-center">
              ${getStatusPill(item.status)}
            </div>

            <div class="flex items-center min-w-0">
              <h1 class="opacity-60 truncate">${escapeHtml(item.studentEmail)}</h1>
            </div>

            <div class="flex items-center justify-end gap-2">
              <button
                class="btn btn-square btn-ghost border-blue-300 text-blue-300"
                type="button"
                onclick="event.stopPropagation()"
              >
                <i class="fi fi-br-pencil pt-1"></i>
              </button>
              <button
                class="btn btn-square btn-ghost border-red-300 text-red-300"
                type="button"
                onclick="event.stopPropagation()"
              >
                <i class="fi fi-br-trash pt-1"></i>
              </button>
            </div>
          </li>
        `,
          )
          .join("");
      }

      function openRecordDrawer(recordId) {
        const record = applicants.find((item) => item.id === recordId);
        if (!record) return;

        drawerName.textContent = record.name;
        drawerStatus.innerHTML = getStatusPill(record.status);
        drawerAppDate.textContent = formatDate(record.appDate);
        drawerFirstInterview.textContent = formatDateTime(
          record.firstInterview,
        );
        drawerSecondInterview.textContent = formatDateTime(
          record.secondInterview,
        );
        drawerStudentEmail.textContent = record.studentEmail;
        drawerPersonalEmail.textContent = record.personalEmail;

        // Application button
        if (record.applicationUrl) {
          viewApplicationBtn.disabled = false;
          viewApplicationBtn.classList.remove("btn-disabled", "opacity-50");
          viewApplicationBtn.onclick = () => {
            window.open(record.applicationUrl, "_blank", "noopener,noreferrer");
          };
        } else {
          viewApplicationBtn.disabled = true;
          viewApplicationBtn.classList.add("btn-disabled", "opacity-50");
          viewApplicationBtn.onclick = null;
        }

        // Notes button
        if (record.notesUrl) {
          viewNotesBtn.disabled = false;
          viewNotesBtn.classList.remove("btn-disabled", "opacity-50");
          viewNotesBtn.onclick = () => {
            window.open(record.notesUrl, "_blank", "noopener,noreferrer");
          };
        } else {
          viewNotesBtn.disabled = true;
          viewNotesBtn.classList.add("btn-disabled", "opacity-50");
          viewNotesBtn.onclick = null;
        }

        recordDrawer.classList.remove("translate-x-full");
        recordDrawerBackdrop.classList.remove(
          "opacity-0",
          "pointer-events-none",
        );
        document.body.classList.add("overflow-hidden");
      }

      function closeRecordDrawer() {
        recordDrawer.classList.add("translate-x-full");
        recordDrawerBackdrop.classList.add("opacity-0", "pointer-events-none");
        document.body.classList.remove("overflow-hidden");
      }

      searchInput.addEventListener("input", () => {
        const query = searchInput.value.trim().toLowerCase();

        const filtered = applicants.filter((item) => {
          return (
            item.name.toLowerCase().includes(query) ||
            item.studentEmail.toLowerCase().includes(query) ||
            item.status.toLowerCase().includes(query)
          );
        });

        renderApplicants(filtered);
      });

      closeDrawerBtn.addEventListener("click", closeRecordDrawer);
      recordDrawerBackdrop.addEventListener("click", closeRecordDrawer);

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          closeRecordDrawer();
        }
      });

      function formatDate(value) {
        if (!value || value === "—") return "—";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return date.toLocaleDateString();
      }

      function formatDateTime(value) {
        if (!value || value === "—") return "—";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return date.toLocaleString();
      }

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      loadApplicants();
    </script>
  </body>
</html>
