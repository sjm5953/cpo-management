<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CPO Management</title>
    <!--tailwind-->
    <link href="src/output.css" rel="stylesheet" />
    <!--fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cal+Sans&family=League+Gothic&family=Lexend:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!--icons-->
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/4.0.0/uicons-bold-rounded/css/uicons-bold-rounded.css"
    />
  </head>
  <body class="font-lexend text-neutral-800">
    <!--main container-->
    <div class="flex flex-col h-screen bg-neutral-50">
      <!--topnav-->
      <div class="bg-primary text-base-100 h-16 px-20 flex items-center">
        <div>
          <h1 class="font-black text-xl">CPO MANAGER</h1>
        </div>
        <div class="flex-1 flex justify-center">
          <ul class="menu menu-horizontal space-x-6">
            <li><a class="navItem" href="index.html">Home</a></li>
            <li>
              <a class="navItem" href="inventory-dash.html">Inventory</a>
            </li>
            <li>
              <a class="navItem navActive" href="workstudies-dash.html">
                Workstudies
              </a>
            </li>
          </ul>
        </div>
        <div>
          <a class="btn bg-base-100 border-0 shadow-none w-30">Login</a>
        </div>
      </div>

      <!--submenu-->
      <div class="bg-base-100 h-16 flex items-center px-60 shadow-sm">
        <div role="tablist" class="tabs tabs-border h-full space-x-6">
          <a role="tab" class="tab" href="workstudies-dash.html">Overview</a>
          <a role="tab" class="tab tab-active" href="workstudies-active.html">
            Active
          </a>
          <a role="tab" class="tab" href="workstudies-applicants.html">
            Applicants
          </a>
        </div>
      </div>

      <!--main-->
      <div class="flex-1 py-10 px-60 overflow-y-auto">
        <!--header-->
        <!--header-->
        <div class="flex items-center justify-between">
          <!-- LEFT -->
          <div class="flex gap-4 items-center">
            <h1 class="font-bold text-lg">Active</h1>
            <h2 id="activeCount" class="opacity-60">0</h2>
          </div>

          <!-- RIGHT -->
          <div class="flex items-center gap-3">
            <!-- Search FIRST -->
            <label class="input w-80 rounded-full">
              <i class="fi fi-br-search pt-1 opacity-60"></i>
              <input
                id="searchInput"
                type="search"
                class="grow"
                placeholder="Search"
              />
            </label>

            <!-- Options dropdown SECOND -->
            <div class="dropdown dropdown-end">
              <button
                id="actionsMenuBtn"
                tabindex="0"
                type="button"
                class="btn bg-base-100 text-base-100 border border-primary text-primary shadow-none text-xl px-4"
              >
                ...
              </button>

              <ul
                tabindex="0"
                class="dropdown-content menu bg-base-100 rounded-box z-[60] w-52 p-2 shadow-lg border border-neutral-200"
              >
                <li>
                  <button id="emailSelectedBtn" type="button">
                    Email Selected
                  </button>
                </li>
                <li>
                  <button id="selectAllBtn" type="button">Select All</button>
                </li>
                <li>
                  <button id="unselectAllBtn" type="button">
                    Unselect All
                  </button>
                </li>
              </ul>
            </div>
          </div>
        </div>

        <!--body-->
        <div>
          <ul
            id="activeWorkstudyList"
            class="list bg-base-100 rounded-box shadow-md mt-4"
          >
            <li class="list-row">
              <div
                class="flex items-center justify-center py-6 w-full opacity-60"
              >
                Loading active workstudies...
              </div>
            </li>
          </ul>
        </div>
      </div>
    </div>
    <!-- drawer backdrop -->
    <div
      id="recordDrawerBackdrop"
      class="fixed inset-0 bg-black/30 opacity-0 pointer-events-none transition-opacity duration-200 z-40"
    ></div>

    <!-- drawer -->
    <aside
      id="recordDrawer"
      class="fixed top-0 right-0 h-full w-full max-w-xl bg-base-100 shadow-2xl translate-x-full transition-transform duration-300 z-50 flex flex-col"
    >
      <div
        class="flex items-center justify-between px-6 py-5 border-b border-neutral-200"
      >
        <div>
          <p class="text-xs uppercase tracking-wide opacity-50 font-bold">
            Workstudy Record
          </p>
          <h2 id="drawerName" class="text-2xl font-black">Name</h2>
        </div>
        <button
          id="closeDrawerBtn"
          type="button"
          class="btn btn-ghost btn-circle"
          aria-label="Close details drawer"
        >
          ✕
        </button>
      </div>

      <div class="flex-1 overflow-y-auto p-6 space-y-6">
        <div class="space-y-4">
          <div class="bg-neutral-50 rounded-2xl p-4">
            <p class="text-xs uppercase opacity-50 font-bold">Name</p>
            <p id="drawerNameField" class="mt-1 font-bold text-lg">—</p>
          </div>

          <div class="bg-neutral-50 rounded-2xl p-4">
            <p class="text-xs uppercase opacity-50 font-bold">Status</p>
            <p id="drawerStatus" class="mt-1 font-bold text-lg">—</p>
          </div>
        </div>

        <div>
          <h3 class="font-black text-lg mb-3">Email Addresses</h3>

          <div class="space-y-3">
            <div
              class="flex items-center justify-between bg-neutral-50 rounded-2xl p-4 gap-4"
            >
              <div class="min-w-0">
                <p class="text-xs uppercase opacity-50 font-bold">
                  Student Email
                </p>
                <p id="drawerStudentEmail" class="mt-1 font-medium break-all">
                  —
                </p>
              </div>
              <button
                type="button"
                class="btn btn-square btn-ghost border border-neutral-200 shrink-0"
                aria-label="Student email action"
              >
                <i class="fi fi-br-envelope pt-1"></i>
              </button>
            </div>

            <div
              class="flex items-center justify-between bg-neutral-50 rounded-2xl p-4 gap-4"
            >
              <div class="min-w-0">
                <p class="text-xs uppercase opacity-50 font-bold">Work Email</p>
                <p id="drawerWorkEmail" class="mt-1 font-medium break-all">—</p>
              </div>
              <button
                type="button"
                class="btn btn-square btn-ghost border border-neutral-200 shrink-0"
                aria-label="Work email action"
              >
                <i class="fi fi-br-envelope pt-1"></i>
              </button>
            </div>

            <div
              class="flex items-center justify-between bg-neutral-50 rounded-2xl p-4 gap-4"
            >
              <div class="min-w-0">
                <p class="text-xs uppercase opacity-50 font-bold">
                  Personal Email
                </p>
                <p id="drawerPersonalEmail" class="mt-1 font-medium break-all">
                  —
                </p>
              </div>
              <button
                type="button"
                class="btn btn-square btn-ghost border border-neutral-200 shrink-0"
                aria-label="Personal email action"
              >
                <i class="fi fi-br-envelope pt-1"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </aside>
    <script>
      const AIRTABLE_TOKEN =
        "pat8zPyrNT7Awd9A7.e83bdd8ebdef7592930621d05ab3da4b7f85e21184183abbe8c4411c47d681a9";
      const BASE_ID = "appYqZMGk18beV4qI";
      const TABLE_NAME = "Active Workstudies";

      const activeWorkstudyList = document.getElementById(
        "activeWorkstudyList",
      );
      const activeCount = document.getElementById("activeCount");
      const searchInput = document.getElementById("searchInput");

      const emailSelectedBtn = document.getElementById("emailSelectedBtn");
      const selectAllBtn = document.getElementById("selectAllBtn");
      const unselectAllBtn = document.getElementById("unselectAllBtn");

      const recordDrawer = document.getElementById("recordDrawer");
      const recordDrawerBackdrop = document.getElementById(
        "recordDrawerBackdrop",
      );
      const closeDrawerBtn = document.getElementById("closeDrawerBtn");

      const drawerName = document.getElementById("drawerName");
      const drawerNameField = document.getElementById("drawerNameField");
      const drawerStatus = document.getElementById("drawerStatus");
      const drawerStudentEmail = document.getElementById("drawerStudentEmail");
      const drawerWorkEmail = document.getElementById("drawerWorkEmail");
      const drawerPersonalEmail = document.getElementById(
        "drawerPersonalEmail",
      );

      let activeWorkstudies = [];

      async function loadActiveWorkstudies() {
        try {
          activeWorkstudyList.innerHTML = `
        <li class="list-row">
          <div class="flex items-center justify-center py-6 w-full opacity-60">
            Loading active workstudies...
          </div>
        </li>
      `;

          const url = `https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(
            TABLE_NAME,
          )}?sort[0][field]=Name&sort[0][direction]=asc`;

          const response = await fetch(url, {
            headers: {
              Authorization: `Bearer ${AIRTABLE_TOKEN}`,
            },
          });

          if (!response.ok) {
            const errorText = await response.text();
            throw new Error(
              `Airtable request failed: ${response.status} - ${errorText}`,
            );
          }

          const data = await response.json();

          activeWorkstudies = data.records
            .map((record) => ({
              id: record.id,
              name: record.fields["Name"] || "Unnamed Student",
              email: record.fields["Student Email"] || "No email",
              studentEmail: record.fields["Student Email"] || "—",
              workEmail: record.fields["Work Email"] || "—",
              personalEmail: record.fields["Personal Email"] || "—",
              status: record.fields["Status"] || "—",
            }))
            .filter(
              (item) => !item.status.toLowerCase().includes("terminated"),
            );

          renderActiveWorkstudies(activeWorkstudies);
        } catch (error) {
          console.error("Error loading active workstudies:", error);
          activeWorkstudyList.innerHTML = `
        <li class="list-row">
          <div class="flex items-center justify-center py-6 w-full text-red-600">
            Failed to load active workstudies.
          </div>
        </li>
      `;
          activeCount.textContent = "0";
        }
      }

      function getStatusPill(status) {
        const normalized = (status || "").toLowerCase();

        let bgClass = "bg-neutral-200 text-neutral-800";

        if (normalized === "active") {
          bgClass = "bg-lime-200 text-lime-800";
        } else if (normalized === "concern") {
          bgClass = "bg-amber-200 text-amber-800";
        }

        return `
      <span class="px-3 py-1 rounded-full text-xs font-bold inline-block ${bgClass}">
        ${escapeHtml(status)}
      </span>
    `;
      }

      function renderActiveWorkstudies(items) {
        activeCount.textContent = items.length;

        if (!items.length) {
          activeWorkstudyList.innerHTML = `
        <li class="list-row">
          <div class="flex items-center justify-center py-6 w-full opacity-60">
            No active workstudies found.
          </div>
        </li>
      `;
          return;
        }

        activeWorkstudyList.innerHTML = items
          .map(
            (item) => `
          <li
            class="list-row work-study grid grid-cols-[auto_1.2fr_1.4fr_0.8fr_auto] items-center gap-4 cursor-pointer hover:bg-neutral-50 transition-colors"
            onclick="openRecordDrawer('${item.id}')"
          >
            <div class="flex items-center">
              <input
                type="checkbox"
                class="checkbox checkbox-sm mr-4 workstudy-checkbox"
                data-record-id="${item.id}"
                onclick="event.stopPropagation()"
              />
            </div>

            <div class="flex items-center min-w-0">
              <h1 class="font-bold text-lg truncate">${escapeHtml(item.name)}</h1>
            </div>

            <div class="flex items-center min-w-0">
              <h1 class="opacity-60 truncate">${escapeHtml(item.email)}</h1>
            </div>

            <div class="flex items-center">
              ${getStatusPill(item.status)}
            </div>

            <div class="flex items-center justify-end gap-2">
              <button
                class="btn btn-square btn-ghost border-blue-300 text-blue-300"
                type="button"
                onclick="event.stopPropagation()"
              >
                <i class="fi fi-br-pencil pt-1"></i>
              </button>
              <button
                class="btn btn-square btn-ghost border-red-300 text-red-300"
                type="button"
                onclick="event.stopPropagation()"
              >
                <i class="fi fi-br-trash pt-1"></i>
              </button>
            </div>
          </li>
        `,
          )
          .join("");
      }

      function openRecordDrawer(recordId) {
        const record = activeWorkstudies.find((item) => item.id === recordId);
        if (!record) return;

        drawerName.textContent = record.name;
        drawerNameField.textContent = record.name;
        drawerStatus.innerHTML = getStatusPill(record.status);
        drawerStudentEmail.textContent = record.studentEmail;
        drawerWorkEmail.textContent = record.workEmail;
        drawerPersonalEmail.textContent = record.personalEmail;

        recordDrawer.classList.remove("translate-x-full");
        recordDrawerBackdrop.classList.remove(
          "opacity-0",
          "pointer-events-none",
        );
        document.body.classList.add("overflow-hidden");
      }

      function closeRecordDrawer() {
        recordDrawer.classList.add("translate-x-full");
        recordDrawerBackdrop.classList.add("opacity-0", "pointer-events-none");
        document.body.classList.remove("overflow-hidden");
      }

      function emailSelectedStudents() {
        const checkedBoxes = document.querySelectorAll(
          ".workstudy-checkbox:checked",
        );

        const selectedEmails = [...checkedBoxes]
          .map((checkbox) => {
            const recordId = checkbox.dataset.recordId;
            const record = activeWorkstudies.find(
              (item) => item.id === recordId,
            );
            return record?.studentEmail || "";
          })
          .filter((email) => email && email !== "—");

        const uniqueEmails = [...new Set(selectedEmails)];

        if (!uniqueEmails.length) {
          alert("Please select at least one record with a student email.");
          return;
        }

        const mailtoUrl = `mailto:?bcc=${encodeURIComponent(uniqueEmails.join(","))}`;
        window.location.href = mailtoUrl;
      }

      function selectAllVisible() {
        const checkboxes = document.querySelectorAll(".workstudy-checkbox");
        checkboxes.forEach((checkbox) => {
          checkbox.checked = true;
        });
      }

      function unselectAllVisible() {
        const checkboxes = document.querySelectorAll(".workstudy-checkbox");
        checkboxes.forEach((checkbox) => {
          checkbox.checked = false;
        });
      }

      searchInput.addEventListener("input", () => {
        const query = searchInput.value.trim().toLowerCase();

        const filtered = activeWorkstudies.filter((item) => {
          return (
            item.name.toLowerCase().includes(query) ||
            item.email.toLowerCase().includes(query) ||
            item.status.toLowerCase().includes(query)
          );
        });

        renderActiveWorkstudies(filtered);
      });

      closeDrawerBtn.addEventListener("click", closeRecordDrawer);
      recordDrawerBackdrop.addEventListener("click", closeRecordDrawer);

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          closeRecordDrawer();
        }
      });

      if (emailSelectedBtn) {
        emailSelectedBtn.addEventListener("click", emailSelectedStudents);
      }

      if (selectAllBtn) {
        selectAllBtn.addEventListener("click", selectAllVisible);
      }

      if (unselectAllBtn) {
        unselectAllBtn.addEventListener("click", unselectAllVisible);
      }

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      loadActiveWorkstudies();
    </script>
  </body>
</html>
